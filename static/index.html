<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Voice Agent</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d1f;
    --surface: #14142a;
    --card: rgba(255,255,255,0.05);
    --border: rgba(255,255,255,0.09);
    --accent: #7c5cbf;
    --accent-light: #9b7fe8;
    --accent-glow: rgba(124,92,191,0.35);
    --green: #06d6a0;
    --red: #ef233c;
    --text: #f0f0ff;
    --sub: #8888aa;
    --radius: 20px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── Header ── */
  header {
    width: 100%;
    max-width: 480px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 24px 0;
  }
  .logo { font-size: 15px; font-weight: 600; color: var(--sub); letter-spacing: .04em; }
  .settings-link {
    width: 38px; height: 38px;
    border-radius: 12px;
    background: var(--card);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    color: var(--sub); font-size: 18px; text-decoration: none;
    transition: background .2s, color .2s;
  }
  .settings-link:hover { background: rgba(255,255,255,0.1); color: var(--text); }

  /* ── Main ── */
  main {
    flex: 1;
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 24px 16px;
    gap: 32px;
  }

  /* ── Avatar ── */
  .avatar-section { display: flex; flex-direction: column; align-items: center; gap: 14px; }

  .avatar-ring {
    position: relative;
    width: 140px; height: 140px;
    display: flex; align-items: center; justify-content: center;
  }
  .avatar-ring::before {
    content: '';
    position: absolute; inset: -6px;
    border-radius: 50%;
    background: conic-gradient(var(--accent), var(--accent-light), var(--accent));
    opacity: 0;
    transition: opacity .4s;
  }
  .avatar-ring.speaking::before  { opacity: 1; animation: spin 3s linear infinite; }
  .avatar-ring.recording::before { opacity: 1; background: conic-gradient(var(--red), #ff6b81, var(--red)); animation: spin 1.5s linear infinite; }

  @keyframes spin { to { transform: rotate(360deg); } }

  .avatar {
    width: 128px; height: 128px;
    border-radius: 50%;
    background: linear-gradient(145deg, #7c5cbf, #4a3a8f);
    display: flex; align-items: center; justify-content: center;
    font-size: 52px; font-weight: 700; color: #fff;
    position: relative; z-index: 1;
    box-shadow: 0 8px 32px rgba(0,0,0,.4);
  }

  .ai-name {
    font-size: 24px; font-weight: 700; letter-spacing: .01em;
  }

  .status-row {
    display: flex; align-items: center; gap: 8px;
    font-size: 14px; color: var(--sub);
  }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--sub);
    transition: background .3s;
  }
  .status-dot.connected  { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .status-dot.recording  { background: var(--red);   box-shadow: 0 0 6px var(--red); animation: blink .8s ease-in-out infinite; }
  .status-dot.processing { background: var(--accent); }

  @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:.3; } }

  .timer { font-size: 13px; color: var(--sub); font-variant-numeric: tabular-nums; }

  /* ── Transcript ── */
  .transcript-card {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 180px;
    max-height: 340px;
  }
  .transcript-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 11px; font-weight: 600; letter-spacing: .08em;
    color: var(--sub); text-transform: uppercase;
    display: flex; justify-content: space-between; align-items: center;
  }
  .reset-link {
    font-size: 11px; color: var(--sub); cursor: pointer;
    background: none; border: none; padding: 0; font-family: inherit;
    letter-spacing: .08em; text-transform: uppercase;
  }
  .reset-link:hover { color: var(--text); }
  .transcript {
    flex: 1; overflow-y: auto; padding: 12px 16px;
    display: flex; flex-direction: column; gap: 10px;
    scroll-behavior: smooth;
  }
  .transcript:empty::before {
    content: 'Your conversation will appear here.';
    color: var(--sub); font-size: 13px;
    display: block; text-align: center; margin-top: 24px;
  }
  .message { display: flex; flex-direction: column; gap: 2px; animation: fadeUp .25s ease; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
  .message.user  { align-items: flex-end; }
  .message.ai    { align-items: flex-start; }
  .msg-role { font-size: 10px; font-weight: 600; color: var(--sub); text-transform: uppercase; letter-spacing: .06em; padding: 0 4px; }
  .msg-bubble {
    max-width: 85%;
    padding: 9px 13px;
    border-radius: 14px;
    font-size: 14px; line-height: 1.5;
  }
  .message.user .msg-bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
  .message.ai   .msg-bubble { background: rgba(255,255,255,0.09); border-bottom-left-radius: 4px; }

  /* ── Pre-call ── */
  #prereq-section {
    width: 100%; max-width: 480px;
    padding: 0 24px 40px;
    display: flex; flex-direction: column; align-items: center; gap: 12px;
  }
  .call-btn {
    width: 100%; max-width: 320px;
    height: 60px;
    border-radius: 30px;
    background: linear-gradient(135deg, #06d6a0, #05b889);
    border: none; cursor: pointer;
    font-size: 17px; font-weight: 700; color: #fff; letter-spacing: .02em;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    box-shadow: 0 8px 24px rgba(6,214,160,.3);
    transition: transform .15s, box-shadow .15s;
  }
  .call-btn:hover  { transform: translateY(-1px); box-shadow: 0 12px 28px rgba(6,214,160,.4); }
  .call-btn:active { transform: translateY(1px);  box-shadow: 0 4px 12px rgba(6,214,160,.25); }
  .call-hint { font-size: 12px; color: var(--sub); }

  /* ── In-call controls ── */
  #controls {
    width: 100%; max-width: 480px;
    padding: 0 24px 40px;
    display: none;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }
  .ctrl-btn {
    width: 56px; height: 56px; border-radius: 50%;
    background: var(--card); border: 1px solid var(--border);
    color: var(--sub); font-size: 22px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .2s, color .2s;
  }
  .ctrl-btn:hover { background: rgba(255,255,255,0.1); color: var(--text); }
  .ctrl-btn:disabled { opacity: .35; cursor: default; }

  .mic-btn {
    width: 72px; height: 72px; border-radius: 50%;
    background: var(--accent);
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 6px 20px var(--accent-glow);
    transition: background .2s, transform .15s, box-shadow .2s;
    color: #fff; font-size: 28px;
  }
  .mic-btn:hover  { background: var(--accent-light); }
  .mic-btn.active { background: var(--red); box-shadow: 0 6px 20px rgba(239,35,60,.4); animation: micPulse 1s ease-in-out infinite; }
  .mic-btn:disabled { opacity: .35; cursor: default; animation: none; }
  @keyframes micPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.07)} }

  .end-btn {
    width: 56px; height: 56px; border-radius: 50%;
    background: var(--red);
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 22px;
    box-shadow: 0 4px 16px rgba(239,35,60,.3);
    transition: background .2s, transform .15s;
  }
  .end-btn:hover  { background: #c8102e; }
  .end-btn:active { transform: scale(.95); }

  /* ── Toast ── */
  #toast {
    position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
    background: rgba(239,35,60,.9); color: #fff;
    padding: 10px 20px; border-radius: 999px;
    font-size: 13px; font-weight: 600;
    opacity: 0; transition: opacity .3s;
    pointer-events: none; white-space: nowrap;
  }
  #toast.show { opacity: 1; }

  /* scrollbar */
  .transcript::-webkit-scrollbar { width: 4px; }
  .transcript::-webkit-scrollbar-track { background: transparent; }
  .transcript::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <span class="logo">AI Voice</span>
  <a href="/settings-page" class="settings-link" title="Settings">⚙</a>
</header>

<main>
  <div class="avatar-section">
    <div class="avatar-ring" id="avatar-ring">
      <div class="avatar" id="avatar">
        <span id="avatar-letter">A</span>
      </div>
    </div>
    <div class="ai-name" id="ai-name">Aria</div>
    <div class="status-row">
      <span class="status-dot" id="status-dot"></span>
      <span id="status-text">Ready to call</span>
    </div>
    <div class="timer" id="timer" style="visibility:hidden">00:00</div>
  </div>

  <div class="transcript-card">
    <div class="transcript-header">
      <span>Transcript</span>
      <button class="reset-link" id="reset-btn" onclick="app.resetConversation()" style="display:none">Clear</button>
    </div>
    <div class="transcript" id="transcript"></div>
  </div>
</main>

<!-- Pre-call -->
<div id="prereq-section">
  <button class="call-btn" onclick="app.startCall()">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M22 16.92v3a2 2 0 01-2.18 2 19.8 19.8 0 01-8.63-3.07A19.5 19.5 0 013.95 13a19.8 19.8 0 01-3.07-8.67A2 2 0 012.87 2h3a2 2 0 012 1.72c.127.96.362 1.903.7 2.81a2 2 0 01-.45 2.11L7.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.338 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
    </svg>
    Start Call
  </button>
  <span class="call-hint">Click to connect to your AI agent</span>
</div>

<!-- In-call controls -->
<div id="controls">
  <button class="ctrl-btn" id="mute-btn" onclick="app.toggleMute()" title="Mute">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
    </svg>
  </button>

  <button class="mic-btn" id="mic-btn" onclick="app.toggleRecording()" title="Speak">
    <svg id="mic-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
    </svg>
  </button>

  <button class="end-btn" onclick="app.endCall()" title="End Call">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M10.68 13.31a16 16 0 003.41 2.6l1.27-1.27a2 2 0 012.11-.45c.907.338 1.85.573 2.81.7A2 2 0 0122 16.92v3a2 2 0 01-2.18 2 19.8 19.8 0 01-8.63-3.07 19.42 19.42 0 01-3.33-2.67m-2.67-3.34a19.8 19.8 0 01-3.07-8.63A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.362 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91"/>
      <line x1="23" y1="1" x2="1" y2="23"/>
    </svg>
  </button>
</div>

<div id="toast"></div>

<script>
class VoiceApp {
  constructor() {
    this.ws       = null;
    this.stream   = null;
    this.recorder = null;
    this.chunks   = [];
    this.state    = 'ready';   // ready | connecting | idle | recording | processing
    this.muted    = false;
    this.timerInterval = null;
    this.elapsed  = 0;
    this.settings = {};
  }

  async init() {
    try {
      const res = await fetch('/api/settings');
      this.settings = await res.json();
      const name = this.settings.ai_name || 'Aria';
      document.getElementById('ai-name').textContent = name;
      document.getElementById('avatar-letter').textContent = name[0].toUpperCase();
    } catch (e) { /* use defaults */ }
  }

  // ── Call lifecycle ───────────────────────────────────────────────

  async startCall() {
    this.setState('connecting');
    this.setStatus('Connecting…');

    try {
      this.stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    } catch {
      this.showToast('Microphone access denied');
      this.setState('ready');
      return;
    }

    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    this.ws = new WebSocket(`${proto}://${location.host}/ws`);

    this.ws.onopen = () => {
      this.setState('idle');
      this.setStatus('Connected');
      this.startTimer();
      document.getElementById('reset-btn').style.display = 'inline';
    };

    this.ws.onmessage = (e) => this.handleMessage(JSON.parse(e.data));

    this.ws.onclose = () => {
      if (this.state !== 'ready') this.endCall();
    };

    this.ws.onerror = () => {
      this.showToast('Connection failed');
      this.endCall();
    };
  }

  endCall() {
    if (this.recorder && this.recorder.state !== 'inactive') this.recorder.stop();
    if (this.stream) { this.stream.getTracks().forEach(t => t.stop()); this.stream = null; }
    if (this.ws) { this.ws.close(); this.ws = null; }
    clearInterval(this.timerInterval); this.timerInterval = null;
    this.elapsed = 0;
    document.getElementById('timer').style.visibility = 'hidden';
    document.getElementById('reset-btn').style.display = 'none';
    this.muted = false;
    this.updateMuteBtn();
    this.setState('ready');
    this.setStatus('Ready to call');
  }

  // ── Recording ───────────────────────────────────────────────────

  toggleRecording() {
    if (this.muted) { this.showToast('Unmute first'); return; }
    if (this.state === 'idle') this.startRecording();
    else if (this.state === 'recording') this.stopRecording();
  }

  startRecording() {
    if (!this.stream) return;
    this.chunks = [];
    this.recorder = new MediaRecorder(this.stream);
    this.recorder.ondataavailable = (e) => { if (e.data.size > 0) this.chunks.push(e.data); };
    this.recorder.onstop = () => this.processAudio();
    this.recorder.start(100);
    this.setState('recording');
    this.setStatus('Recording…');
  }

  stopRecording() {
    if (this.recorder && this.recorder.state === 'recording') {
      this.recorder.stop();
      this.setState('processing');
      this.setStatus('Processing…');
    }
  }

  async processAudio() {
    if (!this.chunks.length) { this.setState('idle'); return; }

    const blob = new Blob(this.chunks, { type: this.chunks[0]?.type || 'audio/webm' });
    try {
      const arrayBuffer = await blob.arrayBuffer();
      const audioCtx   = new AudioContext();
      const decoded    = await audioCtx.decodeAudioData(arrayBuffer);
      await audioCtx.close();

      const resampled  = await this.resampleMono16k(decoded);
      const wavBuffer  = this.encodeWav(resampled);
      const b64        = this.toBase64(wavBuffer);

      this.ws?.send(JSON.stringify({ type: 'audio', data: b64 }));
    } catch (e) {
      console.error('Audio processing error:', e);
      this.showToast('Audio error — try again');
      this.setState('idle');
    }
  }

  async resampleMono16k(audioBuffer) {
    const targetRate = 16000;
    const numFrames  = Math.ceil(audioBuffer.duration * targetRate);
    const ctx = new OfflineAudioContext(1, numFrames, targetRate);
    const src = ctx.createBufferSource();
    src.buffer = audioBuffer;
    src.connect(ctx.destination);
    src.start(0);
    return ctx.startRendering();
  }

  encodeWav(ab) {
    const samples    = ab.getChannelData(0);
    const sampleRate = ab.sampleRate;
    const n          = samples.length;
    const buf        = new ArrayBuffer(44 + n * 2);
    const v          = new DataView(buf);
    const s = (off, str) => { for (let i = 0; i < str.length; i++) v.setUint8(off + i, str.charCodeAt(i)); };

    s(0,'RIFF'); v.setUint32(4, 36 + n*2, true);
    s(8,'WAVE'); s(12,'fmt ');
    v.setUint32(16,16,true); v.setUint16(20,1,true); v.setUint16(22,1,true);
    v.setUint32(24,sampleRate,true); v.setUint32(28,sampleRate*2,true);
    v.setUint16(32,2,true); v.setUint16(34,16,true);
    s(36,'data'); v.setUint32(40,n*2,true);

    let off = 44;
    for (let i = 0; i < n; i++) {
      const x = Math.max(-1, Math.min(1, samples[i]));
      v.setInt16(off, x < 0 ? x * 0x8000 : x * 0x7FFF, true);
      off += 2;
    }
    return buf;
  }

  toBase64(buffer) {
    const bytes = new Uint8Array(buffer);
    let bin = '';
    for (let i = 0; i < bytes.byteLength; i++) bin += String.fromCharCode(bytes[i]);
    return btoa(bin);
  }

  // ── Message handling ────────────────────────────────────────────

  handleMessage(msg) {
    switch (msg.type) {
      case 'status':
        this.onServerStatus(msg.status); break;
      case 'transcription':
        this.addMessage('user', msg.text); break;
      case 'reply':
        this.addMessage('ai', msg.text); break;
      case 'audio':
        this.playAudio(msg.data); break;
      case 'error':
        this.showToast(msg.text || 'Error'); break;
    }
  }

  onServerStatus(status) {
    const labels = {
      transcribing: 'Listening…',
      thinking:     'Thinking…',
      speaking:     'Speaking…',
      idle:         'Connected',
    };
    this.setStatus(labels[status] || status);

    if (status === 'idle' && this.state === 'processing') this.setState('idle');
    if (status === 'speaking') this.setAvatarState('speaking');
    else if (status === 'idle') this.setAvatarState('');
  }

  async playAudio(b64) {
    const bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
    const blob  = new Blob([bytes], { type: 'audio/wav' });
    const url   = URL.createObjectURL(blob);
    const audio = new Audio(url);
    audio.onended = () => { URL.revokeObjectURL(url); this.setAvatarState(''); };
    try { await audio.play(); } catch { URL.revokeObjectURL(url); }
  }

  // ── Mute ────────────────────────────────────────────────────────

  toggleMute() {
    this.muted = !this.muted;
    if (this.stream) {
      this.stream.getAudioTracks().forEach(t => { t.enabled = !this.muted; });
    }
    this.updateMuteBtn();
  }

  updateMuteBtn() {
    const btn = document.getElementById('mute-btn');
    btn.style.background = this.muted ? 'rgba(239,35,60,0.25)' : '';
    btn.style.color       = this.muted ? 'var(--red)' : '';
    btn.title = this.muted ? 'Unmute' : 'Mute';
  }

  // ── Conversation ────────────────────────────────────────────────

  resetConversation() {
    this.ws?.send(JSON.stringify({ type: 'reset' }));
    document.getElementById('transcript').innerHTML = '';
  }

  addMessage(role, text) {
    const t   = document.getElementById('transcript');
    const div = document.createElement('div');
    div.className = `message ${role}`;
    const name = role === 'user' ? 'You' : (this.settings.ai_name || 'AI');
    div.innerHTML = `<span class="msg-role">${name}</span><div class="msg-bubble">${this.escape(text)}</div>`;
    t.appendChild(div);
    t.scrollTop = t.scrollHeight;
  }

  escape(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── UI helpers ──────────────────────────────────────────────────

  setState(state) {
    this.state = state;

    const prereq   = document.getElementById('prereq-section');
    const controls = document.getElementById('controls');
    const micBtn   = document.getElementById('mic-btn');

    const inCall = !['ready','connecting'].includes(state);
    prereq.style.display   = inCall ? 'none' : 'flex';
    controls.style.display = inCall ? 'flex' : 'none';

    if (micBtn) {
      micBtn.classList.toggle('active', state === 'recording');
      micBtn.disabled = !['idle','recording'].includes(state);
    }

    if (state === 'recording') this.setAvatarState('recording');
    else if (state !== 'processing') this.setAvatarState('');
  }

  setAvatarState(cls) {
    const ring = document.getElementById('avatar-ring');
    ring.className = 'avatar-ring' + (cls ? ` ${cls}` : '');
    const dot = document.getElementById('status-dot');
    dot.className = 'status-dot' + (cls === 'recording' ? ' recording' : this.state === 'idle' || this.state === 'processing' ? ' connected' : '');
  }

  setStatus(text) {
    document.getElementById('status-text').textContent = text;
    const dot = document.getElementById('status-dot');
    const inCall = !['ready','connecting'].includes(this.state);
    dot.className = 'status-dot' + (inCall ? (this.state === 'recording' ? ' recording' : ' connected') : '');
  }

  showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(this._toastTimer);
    this._toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
  }

  startTimer() {
    this.elapsed = 0;
    document.getElementById('timer').style.visibility = 'visible';
    this.timerInterval = setInterval(() => {
      this.elapsed++;
      const m = String(Math.floor(this.elapsed / 60)).padStart(2,'0');
      const s = String(this.elapsed % 60).padStart(2,'0');
      document.getElementById('timer').textContent = `${m}:${s}`;
    }, 1000);
  }
}

const app = new VoiceApp();
app.init();
</script>
</body>
