<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings — AI Voice Agent</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d1f;
    --surface: #14142a;
    --card: rgba(255,255,255,0.05);
    --border: rgba(255,255,255,0.09);
    --accent: #7c5cbf;
    --accent-light: #9b7fe8;
    --green: #06d6a0;
    --text: #f0f0ff;
    --sub: #8888aa;
    --radius: 16px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── Header ── */
  header {
    width: 100%;
    max-width: 540px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 24px 0;
  }
  .back-link {
    display: flex; align-items: center; gap: 6px;
    color: var(--sub); text-decoration: none; font-size: 14px;
    transition: color .2s;
  }
  .back-link:hover { color: var(--text); }
  .page-title { font-size: 17px; font-weight: 700; }
  .save-btn-top {
    padding: 8px 18px;
    border-radius: 999px;
    background: var(--accent);
    border: none; cursor: pointer;
    font-size: 14px; font-weight: 600; color: #fff;
    transition: background .2s;
  }
  .save-btn-top:hover { background: var(--accent-light); }

  /* ── Content ── */
  .content {
    width: 100%;
    max-width: 540px;
    padding: 28px 24px 60px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* ── Section card ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .card-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .card-icon { font-size: 18px; }
  .card-title { font-size: 14px; font-weight: 700; }
  .card-desc  { font-size: 12px; color: var(--sub); margin-top: 1px; }
  .card-body  { padding: 16px 18px; display: flex; flex-direction: column; gap: 14px; }

  /* ── Field ── */
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-size: 12px; font-weight: 600; color: var(--sub); text-transform: uppercase; letter-spacing: .06em; }

  .field input, .field select, .field textarea {
    background: rgba(255,255,255,0.07);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color .2s, background .2s;
    width: 100%;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    border-color: var(--accent);
    background: rgba(124,92,191,0.12);
  }
  .field select option { background: #1a1a35; }
  .field textarea {
    min-height: 120px;
    resize: vertical;
    line-height: 1.6;
  }

  /* ── Presets ── */
  .preset-row { display: flex; flex-wrap: wrap; gap: 8px; }
  .preset-chip {
    padding: 5px 13px;
    border-radius: 999px;
    background: rgba(255,255,255,0.07);
    border: 1px solid var(--border);
    font-size: 12px; color: var(--sub);
    cursor: pointer; transition: all .2s;
    white-space: nowrap;
  }
  .preset-chip:hover   { background: rgba(124,92,191,0.2); border-color: var(--accent); color: var(--text); }
  .preset-chip.active  { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* ── Voice preview ── */
  .preview-row { display: flex; gap: 10px; align-items: center; }
  .preview-row select { flex: 1; }
  .preview-btn {
    padding: 10px 16px;
    border-radius: 10px;
    background: rgba(255,255,255,0.07);
    border: 1px solid var(--border);
    color: var(--sub); font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all .2s; white-space: nowrap;
    font-family: inherit;
  }
  .preview-btn:hover { background: rgba(124,92,191,0.2); border-color: var(--accent); color: var(--text); }
  .preview-btn:disabled { opacity: .4; cursor: default; }

  /* ── Bottom save ── */
  .save-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 16px 24px;
    background: linear-gradient(to top, var(--bg) 60%, transparent);
    display: flex; justify-content: center;
  }
  .save-btn-bottom {
    width: 100%; max-width: 540px;
    height: 54px;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent-light));
    border: none; cursor: pointer;
    font-size: 16px; font-weight: 700; color: #fff;
    transition: opacity .2s, transform .15s;
  }
  .save-btn-bottom:hover  { opacity: .9; }
  .save-btn-bottom:active { transform: scale(.98); }

  /* ── Toast ── */
  #toast {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    padding: 10px 22px; border-radius: 999px;
    font-size: 13px; font-weight: 600; color: #fff;
    opacity: 0; transition: opacity .3s;
    pointer-events: none; white-space: nowrap;
  }
  #toast.success { background: rgba(6,214,160,.9); opacity: 1; }
  #toast.error   { background: rgba(239,35,60,.9); opacity: 1; }
</style>
</head>
<body>

<header>
  <a href="/" class="back-link">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
      <path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/>
    </svg>
    Back
  </a>
  <span class="page-title">Settings</span>
  <button class="save-btn-top" onclick="save()">Save</button>
</header>

<div class="content">

  <!-- Identity -->
  <div class="card">
    <div class="card-header">
      <span class="card-icon">🤖</span>
      <div>
        <div class="card-title">Agent Identity</div>
        <div class="card-desc">How your AI presents itself</div>
      </div>
    </div>
    <div class="card-body">
      <div class="field">
        <label>Agent Name</label>
        <input type="text" id="ai_name" placeholder="e.g. Aria, Alex, Nova…" maxlength="32">
      </div>
    </div>
  </div>

  <!-- Context / Instructions -->
  <div class="card">
    <div class="card-header">
      <span class="card-icon">📋</span>
      <div>
        <div class="card-title">Agent Instructions</div>
        <div class="card-desc">Define your agent's role and behaviour</div>
      </div>
    </div>
    <div class="card-body">
      <div class="field">
        <label>Quick Presets</label>
        <div class="preset-row" id="preset-row"></div>
      </div>
      <div class="field">
        <label>System Prompt</label>
        <textarea id="system_prompt" placeholder="Describe how your agent should behave…"></textarea>
      </div>
    </div>
  </div>

  <!-- Voice -->
  <div class="card">
    <div class="card-header">
      <span class="card-icon">🔊</span>
      <div>
        <div class="card-title">Voice</div>
        <div class="card-desc">Powered by Sesame CSM-1B</div>
      </div>
    </div>
    <div class="card-body">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:12px">
        <div>
          <div style="font-size:14px;font-weight:600;margin-bottom:4px">Sesame CSM — Human-like Neural Voice</div>
          <div style="font-size:12px;color:var(--sub)">Generates highly natural speech locally on your device. Runs on MPS (Apple Silicon GPU) for best performance.</div>
        </div>
        <button class="preview-btn" id="preview-btn" onclick="previewVoice()" style="flex-shrink:0">▶ Preview</button>
      </div>
    </div>
  </div>

</div>

<div class="save-bar">
  <button class="save-btn-bottom" onclick="save()">Save Settings</button>
</div>

<div id="toast"></div>

<script>
const PRESETS = [
  {
    id: 'assistant',
    label: 'General Assistant',
    prompt: 'You are a helpful and friendly voice assistant. Keep responses concise and conversational — avoid markdown, bullet points, or special formatting.',
  },
  {
    id: 'customer_service',
    label: 'Customer Service',
    prompt: 'You are a professional customer service agent. Be polite, empathetic, and solution-focused. Keep responses brief and clear. Always confirm what the customer needs before providing a solution.',
  },
  {
    id: 'sales',
    label: 'Sales Agent',
    prompt: 'You are a friendly and knowledgeable sales representative. Help customers understand the value of our products, answer their questions honestly, and guide them toward a decision without being pushy. Keep it conversational.',
  },
  {
    id: 'tech_support',
    label: 'Tech Support',
    prompt: 'You are a patient technical support specialist. Help users troubleshoot issues step by step. Ask clarifying questions when needed, explain solutions in plain language, and confirm the issue is resolved.',
  },
  {
    id: 'receptionist',
    label: 'Receptionist',
    prompt: 'You are a warm and professional receptionist. Greet callers by name when possible, understand their reason for calling, collect relevant details, and direct them to the right department or person.',
  },
  {
    id: 'custom',
    label: '✏️ Custom',
    prompt: '',
  },
];

let activePreset = null;

async function init() {

  // Build preset chips
  const row = document.getElementById('preset-row');
  PRESETS.forEach(p => {
    const chip = document.createElement('button');
    chip.className = 'preset-chip';
    chip.textContent = p.label;
    chip.dataset.id = p.id;
    chip.onclick = () => selectPreset(p);
    row.appendChild(chip);
  });

  // Load current settings
  try {
    const res = await fetch('/api/settings');
    const s   = await res.json();
    document.getElementById('ai_name').value       = s.ai_name      || '';
    document.getElementById('system_prompt').value = s.system_prompt || '';

    const matched = PRESETS.find(p => p.id !== 'custom' && p.prompt.trim() === (s.system_prompt || '').trim());
    if (matched) selectPreset(matched, false);
  } catch {}

  // Detect manual edits to textarea → switch to Custom
  document.getElementById('system_prompt').addEventListener('input', () => {
    if (activePreset?.id !== 'custom') {
      setActiveChip('custom');
      activePreset = PRESETS.find(p => p.id === 'custom');
    }
  });
}

function selectPreset(preset, fillText = true) {
  activePreset = preset;
  setActiveChip(preset.id);
  if (fillText && preset.prompt) {
    document.getElementById('system_prompt').value = preset.prompt;
  }
}

function setActiveChip(id) {
  document.querySelectorAll('.preset-chip').forEach(c => {
    c.classList.toggle('active', c.dataset.id === id);
  });
}

async function previewVoice() {
  const btn = document.getElementById('preview-btn');
  btn.disabled = true;
  btn.textContent = 'Generating…';

  try {
    const name = document.getElementById('ai_name').value || 'Aria';
    const res  = await fetch('/api/preview', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: `Hi, I'm ${name}. How can I help you today?` }),
    });
    if (res.ok) {
      const blob  = await res.blob();
      const url   = URL.createObjectURL(blob);
      const audio = new Audio(url);
      audio.onended = () => URL.revokeObjectURL(url);
      audio.play();
    } else {
      showToast('Preview unavailable — server may still be loading', 'error');
    }
  } catch {
    showToast('Preview unavailable', 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '▶ Preview';
  }
}

async function save() {
  const data = {
    ai_name:       document.getElementById('ai_name').value.trim() || 'Aria',
    system_prompt: document.getElementById('system_prompt').value.trim(),
  };
  try {
    const res = await fetch('/api/settings', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    });
    if (res.ok) showToast('Settings saved!', 'success');
    else        showToast('Save failed', 'error');
  } catch {
    showToast('Save failed', 'error');
  }
}

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = type;
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => { t.className = ''; }, 2500);
}

init();
</script>
</body>
</html>
