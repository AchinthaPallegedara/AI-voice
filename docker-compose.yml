services:
  # ── Python AI gRPC server (Whisper STT + CSM-1B TTS) ────────────────────────
  python-ai:
    build:
      context: .
      dockerfile: python-ai/Dockerfile
      args:
        HF_TOKEN: ${HF_TOKEN:-}
    image: voice-agent-python-ai
    ports:
      - "50051:50051"
    environment:
      GRPC_PORT: "50051"
      MODEL_DEVICE: ${MODEL_DEVICE:-cpu}
      HF_TOKEN: ${HF_TOKEN:-}
    volumes:
      - hf_cache:/root/.cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import grpc; ch = grpc.insecure_channel('localhost:50051'); grpc.channel_ready_future(ch).result(timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 600s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ── Go realtime server (Pion WebRTC + signaling + HTTP) ─────────────────────
  go-server:
    build:
      context: .
      dockerfile: go-server/Dockerfile
    image: voice-agent-go
    ports:
      - "8080:8080"
    environment:
      PYTHON_AI_ADDR: python-ai:50051
      HTTP_ADDR: ":8080"
      FRONTEND_DIR: /app/frontend/dist
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      TURN_SERVER: ${TURN_SERVER:-turn:coturn:3478}
      TURN_USER: ${TURN_USER:-voiceagent}
      TURN_PASS: ${TURN_PASS:-changeme}
      SYSTEM_PROMPT: ${SYSTEM_PROMPT:-You are a helpful voice assistant.}
    depends_on:
      python-ai:
        condition: service_healthy
      coturn:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health | grep -q 'true'"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── coturn TURN/STUN relay ───────────────────────────────────────────────────
  coturn:
    image: coturn/coturn:latest
    network_mode: host
    command: >
      -n --log-file=stdout
      --min-port=49152 --max-port=65535
      --user=${TURN_USER:-voiceagent}:${TURN_PASS:-changeme}
      --realm=voice-agent
      --no-tls
      --no-dtls
      --no-multicast-peers
      --denied-peer-ip=10.0.0.0-10.255.255.255
      --denied-peer-ip=172.16.0.0-172.31.255.255
      --denied-peer-ip=192.168.0.0-192.168.255.255
    restart: unless-stopped

  # ── Prometheus metrics scraper ───────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    restart: unless-stopped

volumes:
  hf_cache:
  prometheus_data:
