services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: voiceagent
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: voiceagent_control
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voiceagent -d voiceagent_control"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  voice-agent:
    build:
      context: ./go-server
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-}
      - HTTP_ADDR=:8080
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3000}
      - CONTROL_PLANE_DATABASE_URL=postgres://voiceagent:secret@postgres:5432/voiceagent_control?sslmode=disable
      - POSTGRES_BASE_DSN=postgres://voiceagent:secret@postgres:5432/
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required}
      - NEXTAUTH_API_URL=http://voice-agent:8080
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8080}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-ws://localhost:8080}
    depends_on:
      - voice-agent
    restart: unless-stopped

volumes:
  postgres_data:
